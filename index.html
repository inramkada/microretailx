<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>microretailX</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      font-family: monospace;
    }

    canvas { display: block; }

    .ui-layer {
      position: absolute;
      z-index: 10;
      color: white;
      user-select: none;
    }

    .top-bar {
      top: 0;
      right: 0;
      width: 100%;
      background: black;
      display: flex;
      justify-content: flex-end;
      padding: 12px 26px;
      box-sizing: border-box;
    }

    .menu {
      position: relative;
    }

    .menu-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      position: relative;
      opacity: 0.85;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
      transform: scale(1) rotate(0deg);
    }

    @keyframes redPulse {
      0% {
        box-shadow: 0 0 4px #ff3333, 0 0 8px #ff3333;
      }
      100% {
        box-shadow: 0 0 10px #ff3333, 0 0 18px #ff3333;
      }
    }

    .menu-dot:hover:not(.active) {
      background: #ff3333;
      opacity: 1;
      animation: redPulse 0.9s ease-in-out infinite alternate;
    }

    .menu-dot::before,
    .menu-dot::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 14px;
      background: #00eaff;
      transform-origin: center;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .menu-dot::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .menu-dot::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    @keyframes xPulseDual {
      0% {
        background: #00eaff;
        box-shadow: 0 0 6px #00eaff, 0 0 14px #00eaff;
      }
      50% {
        background: #ff0033;
        box-shadow: 0 0 8px #ff0033, 0 0 20px #ff0033;
      }
      100% {
        background: #00eaff;
        box-shadow: 0 0 6px #00eaff, 0 0 14px #00eaff;
      }
    }

    .menu-dot.active {
      background: transparent;
      box-shadow: none;
      opacity: 1;
      transform: scale(1.1) rotate(0deg);
      animation: none;
    }

    .menu-dot.active::before,
    .menu-dot.active::after {
      opacity: 1;
      animation: xPulseDual 1.4s ease-in-out infinite;
    }

    .menu-dot.active.spin {
      transform: scale(1.1) rotate(180deg);
    }

    @keyframes xShake {
      0% {
        transform: scale(1.1) translateX(0);
      }
      25% {
        transform: scale(1.1) translateX(-1.5px);
      }
      50% {
        transform: scale(1.1) translateX(1.5px);
      }
      75% {
        transform: scale(1.1) translateX(-1.5px);
      }
      100% {
        transform: scale(1.1) translateX(0);
      }
    }

    .menu-dot.active.shake {
      animation: xShake 0.22s ease-in-out;
    }

    .menu-dot.active.double::before,
    .menu-dot.active.double::after {
      box-shadow:
        0 0 6px #00eaff,
        0 0 14px #00eaff,
        0 0 22px rgba(255, 0, 80, 0.95);
    }

    .menu-dropdown {
      position: absolute;
      top: 160%;
      right: 0;
      min-width: 190px;
      border-radius: 6px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      background: rgba(0, 10, 20, 0.55);
      border: 1px solid #00eaff55;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 14px #00eaff44;
      transition: max-height 0.34s ease, opacity 0.25s ease;
    }

    .menu-dropdown.open {
      max-height: 420px;
      opacity: 1;
    }

    .menu-dropdown a {
      display: block;
      padding: 10px 14px;
      font-size: 15px;
      color: #b8faff;
      text-decoration: none;
      letter-spacing: 1px;
      position: relative;
    }

    .menu-dropdown a:hover {
      background: rgba(0, 40, 60, 0.65);
      color: #ffffff;
    }

    .menu-dropdown a.locations-link {
      padding-left: 28px;
    }

    .menu-dropdown a.locations-link::after {
      content: "◂";
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #8ff3ff;
    }

    .menu-dropdown-sub {
      position: absolute;
      top: 0;
      right: 100%;
      margin-right: 14px;
      min-width: 220px;
      border-radius: 6px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      background: rgba(0, 8, 18, 0.95);
      border: 1px solid #00eaff77;
      border-left: 2px solid rgba(0, 234, 255, 0.5);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 22px #00eaff66;
      transition: max-height 0.3s ease, opacity 0.24s ease;
      padding: 8px 0;
    }

    .menu-dropdown-sub.open {
      max-height: 500px;
      opacity: 1;
    }

    .submenu-group {
      padding: 4px 18px 6px 16px;
    }

    .submenu-label {
      font-size: 11px;
      letter-spacing: 1px;
      color: #7fd8ff;
      opacity: 0.8;
      margin-bottom: 2px;
    }

    .submenu-link {
      display: block;
      font-size: 13px;
      padding: 3px 0;
      color: #e8ffff;
      text-decoration: none;
    }

    .submenu-link:hover {
      color: #ffffff;
      text-shadow: 0 0 6px #00eaff;
    }

    .footer-bar {
      bottom: 0;
      left: 0;
      width: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 8px;
      box-sizing: border-box;
      pointer-events: none;
    }

    .footer-links {
      font-size: 15px;
      pointer-events: auto;
      margin-bottom: 6px;
    }

    .footer-links a {
      color: white;
      text-decoration: none;
      margin: 0 12px;
      opacity: 0.85;
    }

    .footer-links a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .copyright {
      font-size: 9px;
      letter-spacing: 1px;
      opacity: 0.45;
      pointer-events: auto;
    }

    @media (max-width: 600px) {
      .menu-dot { width: 12px; height: 12px; }
      .menu-dropdown a { font-size: 13px; }
      .footer-links { font-size: 13px; }
      .copyright { font-size: 8px; }
      .menu-dropdown-sub { min-width: 190px; margin-right: 10px; }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div class="ui-layer top-bar">

      <div class="menu-dropdown" id="menuDropdown">
        <a href="#" class="locations-link" id="locationsLink">LOCATIONS</a>

      </div>

      <div class="menu-dropdown-sub" id="locationsSubmenu">
        <div class="submenu-group">
          <div class="submenu-label">AFRICA</div>
          <a class="submenu-link" href="#">C1</a>
          <a class="submenu-link" href="#">C2</a>

        </div>
        <div class="submenu-group">
          <div class="submenu-label">AMERICA</div>
          <a class="submenu-link" href="#">C1</a>
          <a class="submenu-link" href="#">C2</a>

        </div>
        <div class="submenu-group">
          <div class="submenu-label">AUSTRALIA</div>
          <a class="submenu-link" href="#">C1</a>
          <a class="submenu-link" href="#">C2</a>
        </div>
        <div class="submenu-group">
          <div class="submenu-label">EUROPE</div>
          <a class="submenu-link" href="#">C1</a>
          <a class="submenu-link" href="#">C2</a>
          <a class="submenu-link" href="#">C3</a>

<script>
const menuToggle = document.getElementById("menuToggle");
const menuDropdown = document.getElementById("menuDropdown");
const menuLinks = menuDropdown.querySelectorAll("a");
const locationsLink = document.getElementById("locationsLink");
const locationsSubmenu = document.getElementById("locationsSubmenu");

menuToggle.addEventListener("click", (e) => {
  e.stopPropagation();
  const open = menuDropdown.classList.contains("open");
  menuDropdown.classList.toggle("open");
  menuToggle.classList.toggle("active", !open);
  if (!open === false) {
    menuToggle.classList.remove("spin", "shake", "double");
    locationsSubmenu.classList.remove("open");
  }
});

document.addEventListener("click", (e) => {
  if (
    !menuDropdown.contains(e.target) &&
    !menuToggle.contains(e.target) &&
    !locationsSubmenu.contains(e.target)
  ) {
    menuDropdown.classList.remove("open");
    locationsSubmenu.classList.remove("open");
    menuToggle.classList.remove("active", "spin", "shake", "double");
  }
});

menuLinks.forEach(link => {
  link.addEventListener("mouseenter", () => {
    if (menuToggle.classList.contains("active")) {
      menuToggle.classList.add("spin");
      setTimeout(() => {
        menuToggle.classList.remove("spin");
      }, 400);
    }
  });
});

locationsLink.addEventListener("click", (e) => {
  e.preventDefault();
  if (menuToggle.classList.contains("active")) {
    menuToggle.classList.add("shake", "double");
    setTimeout(() => {
      menuToggle.classList.remove("shake", "double");
    }, 230);
  }
  const isOpen = locationsSubmenu.classList.contains("open");
  locationsSubmenu.classList.toggle("open", !isOpen);
});

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const mouse = { x: -1000, y: -1000 };
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("resize", () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

function isMobile() {
  return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
}

const MOBILE_MODE = isMobile();
const NUM_PARTICLES = MOBILE_MODE ? 350 : 1800;
const MAX_CONNECTIONS = MOBILE_MODE ? 4 : 10;
const SPEED = 0.5;
const xZoneMargin = 42;
const X_SAT_THRESHOLD = MOBILE_MODE ? 30 : 80;

const particles = [];
const deathMarkers = [];

function inXZone(x, y) {
  const d1 = Math.abs(y - (x * height / width));
  const d2 = Math.abs(y - (height - x * height / width));
  return (d1 < xZoneMargin || d2 < xZoneMargin);
}

function randomHex() {
  return "#" + Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6, "0");
}

function createParticle() {
  let x, y;
  do {
    x = Math.random() * width;
    y = Math.random() * height;
  } while (inXZone(x, y));

  return {
    x, y,
    ox: x, oy: y,
    vx: (Math.random() - 0.5) * SPEED,
    vy: (Math.random() - 0.5) * SPEED,
    radius: 1.5,
    baseColor: "white",
    color: "white",
    inX: false,
    prevInX: false,
    hexCode: randomHex()
  };
}

for (let i = 0; i < NUM_PARTICLES; i++) particles.push(createParticle());

function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    let connections = 0;
    for (let j = i + 1; j < particles.length && connections < MAX_CONNECTIONS; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.strokeStyle = `rgba(0,255,255,${1 - dist / 100})`;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
        connections++;
      }
    }
  }
}

function addDeathMarker(x, y) {
  deathMarkers.push({
    x, y,
    createdAt: performance.now(),
    angle: Math.random() * Math.PI * 2
  });
}

function drawDeathMarkers(now) {
  const LIFETIME = 650;
  for (let i = deathMarkers.length - 1; i >= 0; i--) {
    const m = deathMarkers[i];
    const age = now - m.createdAt;
    if (age > LIFETIME) {
      deathMarkers.splice(i, 1);
      continue;
    }
    const t = age / LIFETIME;
    const alpha = 1 - t;
    const rays = 4;
    const len = 2 + (8 * t);

    ctx.save();
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.4})`;
    ctx.lineWidth = 0.8;

    for (let k = 0; k < rays; k++) {
      const a = m.angle + (Math.PI * 2 * k / rays);
      const x2 = m.x + Math.cos(a) * len;
      const y2 = m.y + Math.sin(a) * len;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    ctx.restore();
  }
}

function animate() {
  const now = performance.now();
  let inXCount = 0;

  for (const p of particles) {
    p.prevInX = p.inX;
    p.inX = inXZone(p.x, p.y);
    if (p.inX) inXCount++;
  }

  const centerX = width / 2;
  const centerY = height / 2;
  const saturated = inXCount >= X_SAT_THRESHOLD;

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, width, height);

  ctx.strokeStyle = "rgba(0,255,255,0.06)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(width, height);
  ctx.moveTo(width, 0);
  ctx.lineTo(0, height);
  ctx.stroke();

  drawConnections();
  drawDeathMarkers(now);

  for (const p of particles) {
    const dxm = p.x - mouse.x;
    const dym = p.y - mouse.y;
    const distm = Math.sqrt(dxm * dxm + dym * dym);
    if (distm < 100) {
      const force = (100 - distm) * 0.007;
      p.vx += (dxm / distm) * force;
      p.vy += (dym / distm) * force;
    }

    if (p.inX && !p.prevInX) addDeathMarker(p.x, p.y);

    if (p.inX && saturated) {
      const dx = p.x - centerX;
      const dy = p.y - centerY;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      p.vx += (dx / d) * 1.2;
      p.vy += (dy / d) * 1.2;
    }

    p.color = p.baseColor;

    if (p.inX) {
      p.vx += Math.sin(now * 0.1 + p.x) * 0.4;
      p.vy += Math.cos(now * 0.1 + p.y) * 0.4;
      p.radius = 3.3 + Math.sin(now * 0.05 + p.x + p.y) * 1.4;
      if (Math.random() < 0.4) p.hexCode = randomHex();
      ctx.font = "12px monospace";
      ctx.fillStyle = "white";
      ctx.fillText(p.hexCode, p.x + 10, p.y + 6);
    } else {
      if (p.prevInX) {
        p.radius = 1.5;
        p.hexCode = randomHex();
      }
    }

    p.vx += (p.ox - p.x) * 0.002;
    p.vy += (p.oy - p.y) * 0.002;
    p.vx += (Math.random() - 0.5) * 0.05;
    p.vy += (Math.random() - 0.5) * 0.05;

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.97;
    p.vy *= 0.97;

    if (p.x < 0 || p.x > width) p.vx *= -1;
    if (p.y < 0 || p.y > height) p.vy *= -1;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
