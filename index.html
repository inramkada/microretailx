<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>microretailX</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }
    canvas { display: block; }
    .footer-links {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: monospace;
      font-size: 14px;
      z-index: 20;
      text-align: center;
    }
    .footer-links a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div class="footer-links">
    <a href="terms.html" target="_blank">Terms</a> |
    <a href="privacy.html" target="_blank">Privacy</a> |
    <a href="cookies.html" target="_blank">Cookies</a> |
    <a href="legal.html" target="_blank">Legal</a>
  </div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const mouse = { x: -1000, y: -1000 };
window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("resize", () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

function isMobile() {
  return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent);
}

const MOBILE_MODE = isMobile();
const NUM_PARTICLES = MOBILE_MODE ? 250 : 900;
const MAX_CONNECTIONS = MOBILE_MODE ? 3 : 7;
const SPEED = 0.45;
const xZoneMargin = 42;

const particles = [];
const deathMarkers = [];
let absorbedCount = 0;

function inXZone(x, y) {
  const d1 = Math.abs(y - (x * height / width));
  const d2 = Math.abs(y - (height - x * height / width));
  return (d1 < xZoneMargin || d2 < xZoneMargin);
}

function randomHex() {
  return "#" + Math.floor(Math.random() * 0xFFFFFF)
    .toString(16).padStart(6, "0");
}

function createParticle() {
  let x, y;
  do {
    x = Math.random() * width;
    y = Math.random() * height;
  } while (inXZone(x, y));
  return {
    x, y,
    ox: x, oy: y,
    vx: (Math.random() - 0.5) * SPEED,
    vy: (Math.random() - 0.5) * SPEED,
    radius: 1.5,
    color: "white",
    inX: false,
    prevInX: false,
    alive: true,
    hexCode: randomHex()
  };
}

for (let i = 0; i < NUM_PARTICLES; i++) particles.push(createParticle());

function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    const pi = particles[i];
    if (!pi.alive) continue;
    let connections = 0;
    for (let j = i + 1; j < particles.length && connections < MAX_CONNECTIONS; j++) {
      const pj = particles[j];
      if (!pj.alive) continue;
      const dx = pi.x - pj.x;
      const dy = pi.y - pj.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.strokeStyle = `rgba(0,255,255,${1 - dist / 100})`;
        ctx.beginPath();
        ctx.moveTo(pi.x, pi.y);
        ctx.lineTo(pj.x, pj.y);
        ctx.stroke();
        connections++;
      }
    }
  }
}

function addDeathMarker(x, y) {
  deathMarkers.push({
    x, y,
    createdAt: performance.now(),
    angle: Math.random() * Math.PI * 2
  });
}

function drawDeathMarkers(now, progress) {
  const LIFETIME = 650;
  for (let i = deathMarkers.length - 1; i >= 0; i--) {
    const m = deathMarkers[i];
    const age = now - m.createdAt;
    if (age > LIFETIME) {
      deathMarkers.splice(i, 1);
      continue;
    }
    const t = age / LIFETIME;
    const alpha = (1 - t) * (0.25 + 0.75 * progress);
    const rays = 4;
    const len = 2 + (8 * t);

    ctx.save();
    ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
    ctx.lineWidth = 0.9 + progress * 0.6;

    for (let k = 0; k < rays; k++) {
      const a = m.angle + (Math.PI * 2 * k / rays);
      const x2 = m.x + Math.cos(a) * len;
      const y2 = m.y + Math.sin(a) * len;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawXLines(now, progress) {
  const flicker = (Math.sin(now * 0.018) + 1) * 0.03 * progress;
  const alpha = 0.06 + progress * 0.4 + flicker;
  const widthBase = 1.4 + progress * 2.2;

  ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
  ctx.lineWidth = widthBase;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(width, height);
  ctx.moveTo(width, 0);
  ctx.lineTo(0, height);
  ctx.stroke();
}

function animate() {
  const now = performance.now();
  const progress = Math.min(absorbedCount / NUM_PARTICLES, 1);

  for (const p of particles) {
    p.prevInX = p.inX;
    p.inX = p.alive && inXZone(p.x, p.y);
  }

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, width, height);

  drawXLines(now, progress);

  if (progress < 1) {
    drawConnections();
    drawDeathMarkers(now, progress);
  } else {
    drawDeathMarkers(now, progress);
  }

  for (const p of particles) {
    if (!p.alive) continue;

    const dxm = mouse.x - p.x;
    const dym = mouse.y - p.y;
    const distm = Math.sqrt(dxm * dxm + dym * dym);

    if (distm < 140) {
      const force = (140 - distm) * 0.015;
      const fx = (dxm / (distm || 1)) * force;
      const fy = (dym / (distm || 1)) * force;
      p.vx += fx;
      p.vy += fy;
    }

    if (p.inX) {
      p.alive = false;
      absorbedCount++;
      addDeathMarker(p.x, p.y);
      continue;
    }

    p.vx += (Math.random() - 0.5) * 0.015;
    p.vy += (Math.random() - 0.5) * 0.015;

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.97;
    p.vy *= 0.97;

    if (p.x < 0 || p.x > width) p.vx *= -1;
    if (p.y < 0 || p.y > height) p.vy *= -1;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();

    if (progress < 1) {
      if (Math.random() < 0.35) p.hexCode = randomHex();
      ctx.font = "11px monospace";
      ctx.fillStyle = "white";
      ctx.fillText(p.hexCode, p.x + 10, p.y + 4);
    }
  }

  drawDeathMarkers(now, progress);

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
