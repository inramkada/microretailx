<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>microretailX</title>
  <style>
    /* RESET Y ESTRUCTURA FLEXBOX */
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100vh; /* Ocupar toda la altura */
      width: 100vw;
      overflow: hidden; /* Evitar scroll */
      display: flex;    /* Activar Flexbox */
      flex-direction: column; /* Apilar elementos verticalmente */
      font-family: monospace;
    }

    /* 1. BARRA SUPERIOR (Para las pestañas) */
    nav.top-bar {
      height: 50px; /* Altura de la barra superior */
      width: 100%;
      background: black;
      flex-shrink: 0; /* No encogerse */
      border-bottom: 1px solid #111; /* Opcional: línea sutil separadora */
      display: flex;
      align-items: center;
      padding-left: 20px;
      color: #666; 
      /* Aquí irían tus pestañas HOME, ETC */
    }

    /* 2. ÁREA CENTRAL (Canvas) */
    main.canvas-container {
      flex-grow: 1; /* Ocupa todo el espacio disponible */
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    
    canvas { 
      display: block; 
    }

    /* 3. BARRA INFERIOR (Footer) */
    footer.bottom-bar {
      height: 40px; /* Altura de la barra inferior */
      width: 100%;
      background: black;
      flex-shrink: 0; /* No encogerse */
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 14px;
      border-top: 1px solid #111; /* Opcional: línea sutil */
      z-index: 10;
    }

    .footer-links a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>

<body>

  <nav class="top-bar">
    <span>[ HOME TABS PLACEHOLDER ]</span>
  </nav>

  <main class="canvas-container" id="canvas-container">
    <canvas id="canvas"></canvas>
  </main>

  <footer class="bottom-bar">
    <div class="footer-links">
      <a href="terms.html" target="_blank">Terms</a> |
      <a href="privacy.html" target="_blank">Privacy</a> |
      <a href="cookies.html" target="_blank">Cookies</a> |
      <a href="legal.html" target="_blank">Legal</a>
    </div>
  </footer>

<script>
const canvas = document.getElementById("canvas");
const container = document.getElementById("canvas-container"); // Referencia al contenedor
const ctx = canvas.getContext("2d");

// Función para ajustar tamaño al contenedor, no a la ventana
function resize() {
  width = canvas.width = container.clientWidth;
  height = canvas.height = container.clientHeight;
}

let width, height;
resize(); // Llamada inicial

const mouse = { x: -1000, y: -1000 };

// Ajuste crítico: Calcular la posición del mouse relativa al canvas
window.addEventListener("mousemove", e => { 
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left; 
  mouse.y = e.clientY - rect.top; 
});

window.addEventListener("resize", resize);

function isMobile() {
  return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent);
}

const MOBILE_MODE = isMobile();
const NUM_PARTICLES = MOBILE_MODE ? 350 : 1800;
const MAX_CONNECTIONS = MOBILE_MODE ? 4 : 10;
const SPEED = 0.5;
const xZoneMargin = 42;
const X_SAT_THRESHOLD = MOBILE_MODE ? 30 : 80;

const particles = [];
const deathMarkers = [];

function inXZone(x, y) {
  // Las zonas X se calculan en base al ancho/alto actual del canvas
  const d1 = Math.abs(y - (x * height / width));
  const d2 = Math.abs(y - (height - x * height / width));
  return (d1 < xZoneMargin || d2 < xZoneMargin);
}

function randomHex() {
  return "#" + Math.floor(Math.random() * 0xFFFFFF)
    .toString(16).padStart(6, "0");
}

function createParticle() {
  let x, y;
  // Aseguramos que la partícula nazca dentro de las dimensiones actuales
  do {
    x = Math.random() * width;
    y = Math.random() * height;
  } while (inXZone(x, y));

  return {
    x, y,
    ox: x, oy: y,
    vx: (Math.random() - 0.5) * SPEED,
    vy: (Math.random() - 0.5) * SPEED,
    radius: 1.5,
    baseColor: "white",
    color: "white",
    inX: false,
    prevInX: false,
    hexCode: randomHex()
  };
}

for (let i = 0; i < NUM_PARTICLES; i++) particles.push(createParticle());

function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    let connections = 0;
    for (let j = i + 1; j < particles.length && connections < MAX_CONNECTIONS; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.strokeStyle = `rgba(0,255,255,${1 - dist / 100})`;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
        connections++;
      }
    }
  }
}

function addDeathMarker(x, y) {
  deathMarkers.push({
    x, y,
    createdAt: performance.now(),
    angle: Math.random() * Math.PI * 2
  });
}

function drawDeathMarkers(now) {
  const LIFETIME = 650;
  for (let i = deathMarkers.length - 1; i >= 0; i--) {
    const m = deathMarkers[i];
    const age = now - m.createdAt;
    if (age > LIFETIME) {
      deathMarkers.splice(i, 1);
      continue;
    }
    const t = age / LIFETIME;
    const alpha = 1 - t;
    const rays = 4;
    const len = 2 + (8 * t);

    ctx.save();
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.4})`;
    ctx.lineWidth = 0.8;

    for (let k = 0; k < rays; k++) {
      const a = m.angle + (Math.PI * 2 * k / rays);
      const x2 = m.x + Math.cos(a) * len;
      const y2 = m.y + Math.sin(a) * len;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function animate() {
  const now = performance.now();
  let inXCount = 0;

  for (const p of particles) {
    p.prevInX = p.inX;
    p.inX = inXZone(p.x, p.y);
    if (p.inX) inXCount++;
  }

  const centerX = width / 2;
  const centerY = height / 2;
  const saturated = inXCount >= X_SAT_THRESHOLD;

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, width, height);

  // Dibuja la X de fondo
  ctx.strokeStyle = "rgba(0,255,255,0.06)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(width, height);
  ctx.moveTo(width, 0);
  ctx.lineTo(0, height);
  ctx.stroke();

  drawConnections();
  drawDeathMarkers(now);

  for (const p of particles) {
    const dxm = p.x - mouse.x;
    const dym = p.y - mouse.y;
    const distm = Math.sqrt(dxm * dxm + dym * dym);
    
    // Interacción con mouse
    if (distm < 100) {
      const force = (100 - distm) * 0.007;
      p.vx += (dxm / distm) * force;
      p.vy += (dym / distm) * force;
    }

    if (p.inX && !p.prevInX) addDeathMarker(p.x, p.y);

    if (p.inX && saturated) {
      const dx = p.x - centerX;
      const dy = p.y - centerY;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      p.vx += (dx / d) * 1.2;
      p.vy += (dy / d) * 1.2;
    }

    p.color = p.baseColor;

    if (p.inX) {
      p.vx += Math.sin(now * 0.1 + p.x) * 0.4;
      p.vy += Math.cos(now * 0.1 + p.y) * 0.4;
      p.radius = 3.3 + Math.sin(now * 0.05 + p.x + p.y) * 1.4;
      if (Math.random() < 0.4) p.hexCode = randomHex();
      ctx.font = "12px monospace";
      ctx.fillStyle = "white";
      ctx.fillText(p.hexCode, p.x + 10, p.y + 6);
    } else {
      if (p.prevInX) {
        p.radius = 1.5;
        p.hexCode = randomHex();
      }
    }

    // Retorno al origen (elasticidad)
    p.vx += (p.ox - p.x) * 0.002;
    p.vy += (p.oy - p.y) * 0.002;
    
    // Movimiento browniano
    p.vx += (Math.random() - 0.5) * 0.05;
    p.vy += (Math.random() - 0.5) * 0.05;

    p.x += p.vx;
    p.y += p.vy;

    // Fricción
    p.vx *= 0.97;
    p.vy *= 0.97;

    // Rebote en bordes
    if (p.x < 0 || p.x > width) p.vx *= -1;
    if (p.y < 0 || p.y > height) p.vy *= -1;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
