<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Network</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://unpkg.com/three"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000510; font-family: 'Inter', sans-serif; }

    /* UI PANEL */
    #control-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(10, 20, 30, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 0, 0.2); /* Borde actualizado a neón */
      border-radius: 8px;
      padding: 24px;
      z-index: 100;
      width: 280px;
      color: white;
    }

    h3 {
      margin: 0 0 15px 0;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffff00; /* Texto actualizado a neón */
      border-bottom: 1px solid rgba(255, 255, 0, 0.2);
      padding-bottom: 8px;
    }

    select {
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      margin-bottom: 10px;
    }
    select:hover { border-color: #ffff00; } /* Hover neón */

    .legend { margin-top: 15px; font-size: 10px; color: #8899aa; display:flex; flex-direction:column; gap:8px;}
    .dot { width: 8px; height: 8px; border-radius: 50%; display:inline-block; margin-right:6px;}
    .line { width: 20px; height: 2px; display:inline-block; margin-right:6px;}

    #status {
      position: absolute;
      bottom: 24px;
      left: 24px;
      color: #ffff00; /* Texto actualizado a neón */
      font-size: 10px;
      letter-spacing: 1.5px;
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="control-panel">
    <h3>Strategic Command</h3>
    <select id="viewSelector" onchange="enfocarRegion()">
      <option value="all">ORBITA GLOBAL</option>
      <option value="delaware">HQ GLOBAL(Delaware)</option>
      <option value="morocco">🇲🇦 AFRICA HUB (Tanger)</option>
      <option value="europe">🇪🇺 EUROPE HUB (Rotterdam)</option>
      <option value="texas">🇺🇸 NORTH AMERICA(Texas)</option>
      <option value="uae">🇦🇪 MIDLE EAST (Dubai)</option>
      <option value="asia">🇨🇳 APAC (Shanghai)</option>
    </select>
    
    <div class="legend">
      <div><span class="dot" style="background-color: #ffff00;"></span>HQ Global (Delaware)</div>
      <div><span class="dot" style="background-color: #ff3366;"></span>HUB</div>
      <div><span class="dot" style="background-color: #00ffcc;"></span>City</div>
      <div style="margin-top:5px; border-top:1px solid #333; padding-top:5px;">
        <div><span class="line" style="background-color: #ffff00;"></span>Intercontinental</div>
        <div><span class="line" style="background-color: #ff3366;"></span>Regional</div>
      </div>
    </div>
  </div>


  <div id="globeViz"></div>

  <script>
    // --- 1. DEFINICIÓN DE HUBS (TÁNGER ACTUALIZADO) ---
    const GLOBAL_HQ = { lat: 39.15, lng: -75.52, name: "HQ: DELAWARE", type: 'hq' };

    const HUBS = {
      texas:   { lat: 32.77, lng: -96.79, name: "Hub Texas" },
      europe:  { lat: 51.92, lng: 4.47,   name: "Hub Rotterdam" },
      morocco: { lat: 35.75, lng: -5.83,  name: "Hub Tanger" }, 
      uae:     { lat: 25.20, lng: 55.27,  name: "Hub Dubai" },
      asia:    { lat: 31.23, lng: 121.47, name: "Hub Shanghai" }
    };

    // --- 2. RED REGIONAL ---
    const REGIONAL_NETWORK = [
      // === AFRICA & ENLACE EUROPA (Desde Tánger) ===
      { hub: HUBS.morocco, to: { lat: 30.04, lng: 31.23, name: "Cairo (EG)" } },
      { hub: HUBS.morocco, to: { lat: 6.52,  lng: 3.37,  name: "Lagos (NG)" } }, 
      { hub: HUBS.morocco, to: { lat: -1.29, lng: 36.82, name: "Nairobi (KE)" } }, 
      { hub: HUBS.morocco, to: { lat: -26.20, lng: 28.04, name: "Johannesburg (ZA)" } }, 
      { hub: HUBS.morocco, to: { lat: 14.69, lng: -17.44, name: "Dakar (SN)" } }, 
      // Conexiones Estratégicas a Europa (Saltando España)
      { hub: HUBS.morocco, to: { lat: 48.85, lng: 2.35,   name: "Paris (FR)" } },
      { hub: HUBS.morocco, to: { lat: 51.50, lng: -0.12,  name: "London (UK)" } },
      { hub: HUBS.morocco, to: { lat: 41.90, lng: 12.49,  name: "Rome (IT)" } },

      // === EUROPA (Desde Rotterdam) ===
      { hub: HUBS.europe, to: { lat: 38.72, lng: -9.13,  name: "Lisboa" } },
      { hub: HUBS.europe, to: { lat: 42.50, lng: 1.52,   name: "Andorra" } },
      { hub: HUBS.europe, to: { lat: 52.52, lng: 13.40,  name: "Berlin" } },
      { hub: HUBS.europe, to: { lat: 55.67, lng: 12.56,  name: "Copenhagen" } },
      { hub: HUBS.europe, to: { lat: 47.37, lng: 8.54,   name: "Zurich" } },

      // === USA (Texas) ===
      { hub: HUBS.texas, to: { lat: 34.05, lng: -118.24, name: "Los Angeles" } },
      { hub: HUBS.texas, to: { lat: 40.71, lng: -74.00,  name: "New York" } },
      { hub: HUBS.texas, to: { lat: 41.87, lng: -87.62,  name: "Chicago" } },
      { hub: HUBS.texas, to: { lat: 25.76, lng: -80.19,  name: "Miami" } },
      { hub: HUBS.texas, to: { lat: 19.43, lng: -99.13,  name: "Mexico City" } },

      // === UAE (Dubai) ===
      { hub: HUBS.uae, to: { lat: 24.71, lng: 46.67, name: "Riyadh" } },
      { hub: HUBS.uae, to: { lat: 25.28, lng: 51.53, name: "Doha" } },
      { hub: HUBS.uae, to: { lat: 24.45, lng: 54.37, name: "Abu Dhabi" } },

      // === ASIA (Shanghai) ===
      { hub: HUBS.asia, to: { lat: 35.68, lng: 139.69, name: "Tokyo" } },
      { hub: HUBS.asia, to: { lat: 1.35,  lng: 103.81, name: "Singapore" } },
      { hub: HUBS.asia, to: { lat: 55.75, lng: 37.61,  name: "Moscow" } },
      { hub: HUBS.asia, to: { lat: -33.86, lng: 151.20, name: "Sydney" } }
    ];

    // --- 3. PROCESAMIENTO DE DATOS ---
    
    const allDestinations = [];
    const destSet = new Set();
    REGIONAL_NETWORK.forEach(r => {
      if(!destSet.has(r.to.name)){
        allDestinations.push(r.to);
        destSet.add(r.to.name);
      }
    });

    const globalRoutes = allDestinations.map(city => ({
      startLat: GLOBAL_HQ.lat, startLng: GLOBAL_HQ.lng,
      endLat: city.lat, endLng: city.lng,
      name: `Global -> ${city.name}`,
      type: 'global'
    }));
    
    Object.values(HUBS).forEach(hub => {
        globalRoutes.push({
            startLat: GLOBAL_HQ.lat, startLng: GLOBAL_HQ.lng,
            endLat: hub.lat, endLng: hub.lng,
            name: `Global HQ -> ${hub.name}`,
            type: 'global'
        });
    });

    const regionalArcs = REGIONAL_NETWORK.map(r => ({
      startLat: r.hub.lat, startLng: r.hub.lng,
      endLat: r.to.lat, endLng: r.to.lng,
      type: 'regional'
    }));

    const finalArcs = [...regionalArcs, ...globalRoutes];

    const points = [GLOBAL_HQ];
    const addedPoints = new Set([GLOBAL_HQ.name]);

    const addPoint = (p, type) => {
      if(!addedPoints.has(p.name)) {
        points.push({...p, type});
        addedPoints.add(p.name);
      }
    };

    Object.values(HUBS).forEach(h => addPoint(h, 'hub'));
    allDestinations.forEach(d => addPoint(d, 'spoke'));


    // --- 4. RENDERIZADO ---
    const world = Globe()
      (document.getElementById('globeViz'))
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .atmosphereColor('#204080')
      .atmosphereAltitude(0.15)

      .pointsData(points)
      .pointColor(d => {
        // ==> CAMBIO: Amarillo Neón #ffff00
        if(d.type === 'hq') return '#ffff00';   
        if(d.type === 'hub') return '#ff3366'; 
        return '#00ffcc';                      
      })
      .pointAltitude(d => d.type === 'hq' ? 0.04 : 0.006)
      .pointRadius(d => d.type === 'hq' ? 0.7 : (d.type === 'hub' ? 0.4 : 0.25))
      .pointLabel('name')

      .arcsData(finalArcs)
      // ==> CAMBIO COLOR: Amarillo Neón más intenso ['#ffff00', 'rgba(255, 255, 0, 0.5)']
      .arcColor(d => d.type === 'global' ? ['#ffff00', 'rgba(255, 255, 0, 0.5)'] : ['#ff3366', '#00ffcc'])
      // ==> CAMBIO FORMA: Bajamos altitud de 0.6 a 0.25 para hacerla más plana/rasa
      .arcAltitude(d => d.type === 'global' ? 0.25 : null) 
      .arcStroke(d => d.type === 'global' ? 0.3 : 0.4)
      .arcDashLength(0.4)
      .arcDashGap(d => d.type === 'global' ? 5 : 2)
      .arcDashAnimateTime(d => d.type === 'global' ? 5000 : 3000);

    // Luces
    const globeMaterial = world.globeMaterial();
    globeMaterial.shininess = 0.9;
    world.scene().add(new THREE.AmbientLight(0xffffff, 1));
    
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // --- 5. CONTROL DE CÁMARA ---
    function enfocarRegion() {
      const region = document.getElementById('viewSelector').value;
      world.controls().autoRotate = false;

      const coords = {
        'all':      { lat: 20, lng: 0, altitude: 2.5 },
        'delaware': { lat: 39.15, lng: -75.52, altitude: 1.2 },
        'morocco':  { lat: 35, lng: -5, altitude: 1.0 }, 
        'texas':    { lat: 35, lng: -95, altitude: 1.5 },
        'europe':   { lat: 48, lng: 10, altitude: 1.3 },
        'uae':      { lat: 26, lng: 55, altitude: 0.9 },
        'asia':     { lat: 30, lng: 115, altitude: 1.8 }
      };

      if(region === 'all') world.controls().autoRotate = true;
      world.pointOfView(coords[region], 1800);
    }
  </script>
</body>
</html>
