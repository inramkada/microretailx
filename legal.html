<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Global Operations Monitor</title>
  <script src="//unpkg.com/globe.gl"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    /* --- ESTÉTICA SURVEILLANCE --- */
    body { 
      margin: 0; 
      background-color: #000; 
      font-family: 'Share Tech Mono', monospace; 
      color: #00ffcc; /* EL COLOR "SURVEILLANCE" (Cian) */
      overflow: hidden; 
    }

    /* --- SIDEBAR (Panel de Control) --- */
    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 320px;
      height: 100vh;
      background: rgba(5, 10, 15, 0.9);
      border-right: 2px solid #005544;
      display: flex;
      flex-direction: column;
      z-index: 10;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .header {
      padding: 20px;
      background: rgba(0, 255, 204, 0.1);
      border-bottom: 1px solid #00ffcc;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 5px;
    }

    /* Lista de Lugares */
    #location-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .list-item {
      padding: 15px 20px;
      border-bottom: 1px solid #112222;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .list-item:hover {
      background: rgba(0, 255, 204, 0.1);
      padding-left: 25px; /* Efecto de desplazamiento */
    }

    .list-item.active {
      background: #00ffcc;
      color: #000;
      font-weight: bold;
    }

    /* Detalles del Nodo (El "Desplegable") */
    .details-panel {
      display: none; /* Oculto por defecto */
      background: #001a1a;
      padding: 10px 20px;
      border-bottom: 1px solid #004433;
      font-size: 12px;
    }
    
    .sub-item {
      padding: 5px 0;
      color: #aaa;
      display: flex;
      justify-content: space-between;
    }
    .sub-item span.code { color: #fff; font-weight: bold; }

    /* Botón Volver */
    #reset-btn {
      padding: 15px;
      text-align: center;
      background: #220000;
      color: #ff3333;
      cursor: pointer;
      border-top: 1px solid #550000;
      text-transform: uppercase;
      display: none; /* Se muestra solo al entrar en una ciudad */
    }
    #reset-btn:hover { background: #440000; }

    /* --- GLOBO --- */
    #globe-viz { width: 100vw; height: 100vh; }

    /* Estilos de Etiquetas en el Mapa (Más grandes como pediste) */
    .map-label {
      background: rgba(0,0,0,0.8);
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 4px 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px; /* Letra más grande */
      font-weight: bold;
      pointer-events: none; /* Para que no interfiera con el click */
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="header">
      <h1>LOCATIONS</h1>
      <div class="subtitle">SECURE CONNECTION ESTABLISHED</div>
    </div>

    <div id="location-list">
      </div>

    <div id="reset-btn" onclick="resetView()">
      [ X ] CERRAR VISTA DETALLADA
    </div>
  </div>

  <div id="globe-viz"></div>

  <script>
    // ---------------------------------------------------------
    // 1. BASE DE DATOS ESTRUCTURADA
    // Definimos los "Hubs" (Padres) y sus "Targets" (Hijos/Donde reparten)
    // ---------------------------------------------------------
    const operationsData = [
      {
        id: 'texas',
        name: "TEXAS HQ",
        lat: 31.9686, lng: -99.9018,
        type: 'HUB',
        // A dónde sirve Texas:
        targets: [
          { code: "AE1", name: "California", lat: 36.7783, lng: -119.4179 },
          { code: "AE2", name: "Los Angeles", lat: 34.0522, lng: -118.2437 },
          { code: "AE3", name: "New York", lat: 40.7128, lng: -74.0060 },
          { code: "AE4", name: "Colorado", lat: 39.5501, lng: -105.7821 },
          { code: "AE5", name: "Chicago", lat: 41.8781, lng: -87.6298 }
        ]
      },
      {
        id: 'panama',
        name: "PANAMA OPS",
        lat: 8.5380, lng: -80.7821,
        type: 'HUB',
        targets: [
          { code: "PA1", name: "Colombia", lat: 4.5709, lng: -74.2973 },
          { code: "PA2", name: "Costa Rica", lat: 9.7489, lng: -83.7534 }
        ]
      },
      // Datos de relleno para que el mapa no se vea vacío
      { id: 'uk', name: "LONDON HUB", lat: 55.3781, lng: -3.4360, type: 'HUB', targets: [] },
      { id: 'uae', name: "ABU DHABI", lat: 24.4539, lng: 54.3773, type: 'HUB', targets: [] },
      { id: 'swe', name: "STOCKHOLM", lat: 60.1282, lng: 18.6435, type: 'HUB', targets: [] }
    ];

    let activeHub = null; // Variable para saber si estamos viendo una ciudad o el mundo entero

    // ---------------------------------------------------------
    // 2. INICIALIZAR GLOBO
    // ---------------------------------------------------------
    const world = Globe()
      (document.getElementById('globe-viz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .atmosphereColor('#00ffcc')
      .atmosphereAltitude(0.15)
      
      // CONFIGURACIÓN DE PUNTOS
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(d => d.type === 'HUB' ? '#00ffcc' : '#ff0055') // Verde Hubs, Rojo Destinos
      .pointRadius(d => d.type === 'HUB' ? 0.6 : 0.3) // Hubs más grandes
      .pointAltitude(0.01)
      
      // ETIQUETAS PERSONALIZADAS (HTML)
      .pointLabel(d => `
        <div class="map-label" style="border-color: ${d.type === 'HUB' ? '#00ffcc' : '#ff0055'}">
          ${d.name}
        </div>
      `)

      // CONFIGURACIÓN DE ARCOS (LÍNEAS)
      .arcColor(() => ['rgba(0, 255, 204, 0.2)', 'rgba(0, 255, 204, 1)']) // Degunado cian
      .arcDashLength(0.4)
      .arcDashGap(2)
      .arcDashAnimateTime(1500) // Velocidad de los datos viajando
      .arcStroke(0.5)

      // EVENTO CLICK EN EL MAPA
      .onPointClick(handleNodeClick);

    // Ajustes de Material (Hacerlo más oscuro/elegante)
    world.globeMaterial().color = new THREE.Color(0x333333);
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // ---------------------------------------------------------
    // 3. LÓGICA DE CONTROL (EL CEREBRO)
    // ---------------------------------------------------------

    // Renderizar lista inicial
    renderSidebar();
    updateMapData();

    function renderSidebar() {
      const list = document.getElementById('location-list');
      list.innerHTML = ''; // Limpiar

      operationsData.forEach(hub => {
        // Crear elemento de lista
        const item = document.createElement('div');
        item.className = 'list-item';
        if (activeHub && activeHub.id === hub.id) item.className += ' active';
        
        item.innerHTML = `<span>${hub.name}</span> <span>[+]</span>`;
        item.onclick = () => handleNodeClick(hub);
        list.appendChild(item);

        // Si este Hub está activo, mostrar sus DETALLES (Desplegable)
        if (activeHub && activeHub.id === hub.id) {
          const details = document.createElement('div');
          details.className = 'details-panel';
          details.style.display = 'block'; // Mostrar
          
          if(hub.targets.length > 0) {
            hub.targets.forEach(t => {
              details.innerHTML += `
                <div class="sub-item">
                  <span class="code">${t.code}</span>
                  <span>${t.name}</span>
                </div>
              `;
            });
          } else {
            details.innerHTML = '<div style="color:#555">NO ACTIVE ROUTES</div>';
          }
          list.appendChild(details);
        }
      });
    }

    // Función principal cuando se elige una ciudad
    function handleNodeClick(node) {
      if (node.type !== 'HUB') return; // Si clickas un destino, no hacemos nada (o podrías mostrar info)

      activeHub = node; // Guardamos quién está activo
      
      // 1. Mover cámara
      world.pointOfView({ lat: node.lat, lng: node.lng, altitude: 1.8 }, 1500);
      world.controls().autoRotate = false; // Parar rotación para que el usuario explore

      // 2. Actualizar UI
      document.getElementById('reset-btn').style.display = 'block';
      renderSidebar();
      
      // 3. Actualizar Datos del Mapa (Mostrar hijos y líneas)
      updateMapData();
    }

    // Volver a la vista general
    function resetView() {
      activeHub = null;
      document.getElementById('reset-btn').style.display = 'none';
      world.controls().autoRotate = true;
      world.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 1500); // Zoom out
      renderSidebar();
      updateMapData();
    }

    // Calcular qué mostrar en el globo
    function updateMapData() {
      // PUNTOS: Si hay un hub activo, mostramos el Hub + sus Hijos. 
      // Si no, mostramos todos los Hubs.
      let pointsToShow = [];
      let arcsToShow = [];

      if (activeHub) {
        // Modo Detalle: Solo el Hub activo y sus destinos
        pointsToShow.push(activeHub);
        // Añadir hijos y formatearlos como puntos
        const children = activeHub.targets.map(t => ({
          ...t,
          type: 'TARGET' // Marcarlos diferente
        }));
        pointsToShow = pointsToShow.concat(children);

        // Crear lineas (Arcos) desde Hub a Hijos
        arcsToShow = activeHub.targets.map(t => ({
          startLat: activeHub.lat,
          startLng: activeHub.lng,
          endLat: t.lat,
          endLng: t.lng
        }));

      } else {
        // Modo General: Mostrar todos los Hubs
        pointsToShow = operationsData;
        arcsToShow = []; // Sin líneas en vista general para no ensuciar
      }

      // Inyectar datos al globo
      world.pointsData(pointsToShow);
      world.arcsData(arcsToShow);
    }

  </script>
</body>
</html>
