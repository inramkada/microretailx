<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Operations - Night Vision</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

    /* PANEL DE CONTROL ESTILO CRISTAL */
    #control-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(10, 20, 15, 0.85); /* Fondo verdoso muy oscuro */
      backdrop-filter: blur(10px);
      border: 1px solid rgba(50, 255, 100, 0.2); /* Borde verde sutil */
      border-radius: 4px;
      padding: 24px;
      z-index: 100;
      width: 240px;
      color: #cfc;
    }

    #control-panel h3 {
      margin: 0 0 15px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #4ade80; /* Verde Palantir brillante */
      border-bottom: 1px solid rgba(74, 222, 128, 0.2);
      padding-bottom: 8px;
    }

    /* SELECTOR MODERNO */
    select {
      width: 100%;
      padding: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    select:hover { border-color: #4ade80; }

    /* LEYENDA */
    .legend { margin-top: 20px; font-size: 10px; color: #8ba; display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; }

    /* TOOLTIP PERSONALIZADO (Al pasar el ratón) */
    .scene-tooltip {
      background: rgba(0, 20, 10, 0.9) !important;
      border: 1px solid #4ade80 !important;
      color: #4ade80 !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      padding: 8px !important;
      border-radius: 2px !important;
      box-shadow: 0 0 10px rgba(74,222,128,0.2) !important;
    }
  </style>

  <script src="//unpkg.com/globe.gl"></script>
</head>

      <option value="uae">Region: Middle East (UAE)</option>
      <option value="asia">Region: Asia Pacific</option>

    </div>
  </div>
