<!DOCTYPE html>
<html lang="es">
<head>
  <style> body { margin: 0; background-color: #000; overflow: hidden; } </style>
  <script src="//unpkg.com/globe.gl"></script>
</head>
<body>
  <div id="globo-surveillance"></div>

  <script>
    // 1. TUS DATOS (Tus ubicaciones exactas)
    const misSedes = [
      { name: "Texas, USA", lat: 31.9686, lng: -99.9018 },
      { name: "Panamá", lat: 8.5380, lng: -80.7821 },
      { name: "Abu Dhabi", lat: 24.4539, lng: 54.3773 },
      { name: "Marruecos", lat: 31.7917, lng: -7.0926 },
      { name: "Nigeria", lat: 9.0820, lng: 8.6753 },
      { name: "Reino Unido", lat: 55.3781, lng: -3.4360 },
      { name: "Noruega", lat: 60.4720, lng: 8.4689 },
      { name: "Suecia", lat: 60.1282, lng: 18.6435 },
      { name: "Holanda", lat: 52.1326, lng: 5.2913 },
      { name: "Alemania", lat: 51.1657, lng: 10.4515 },
      { name: "Bruselas", lat: 50.8503, lng: 4.3517 },
      { name: "Nueva Zelanda", lat: -40.9006, lng: 174.8860 },
      { name: "Perth, Aus", lat: -31.9505, lng: 115.8605 },
      { name: "Chile", lat: -35.6751, lng: -71.5430 }
    ];

    // 2. Configuración Fidedigna a Surveillance Watch
    const mundo = Globe()
      (document.getElementById('globo-surveillance'))
      
      // -- A. LA TEXTURA CLAVE: "Earth at Night" --
      // Esta es la imagen satelital real de las luces de la tierra.
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundColor('#000000') // Negro absoluto
      
      // -- B. Atmósfera estilo "Monitor" --
      // Un brillo muy sutil azulado, apenas visible, para dar volumen.
      .atmosphereColor('#4aaee3') 
      .atmosphereAltitude(0.15)
      
      // -- C. Puntos de Datos (Tus operaciones) --
      // Usamos un verde brillante (#21ff00) o Cian que contrasta con las luces amarillas del mapa.
      .pointsData(misSedes)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(() => '#21ff00') // Verde neón estilo "Radar activo"
      .pointAltitude(0.005)        // Muy pegados a la tierra
      .pointRadius(0.5)            // Puntos pequeños y precisos
      
      // -- D. Añadir Anillos de "Ping" (Opcional pero recomendado para este estilo) --
      // Esto hace que el mapa se sienta "en vivo".
      .ringsData(misSedes)
      .ringColor(() => (t) => `rgba(33, 255, 0, ${1-t})`) // Mismo verde desvaneciéndose
      .ringMaxRadius(3)
      .ringPropagationSpeed(2)
      .ringRepeatPeriod(2000) // Un pulso lento cada 2 segundos

      // -- E. Etiquetas estilo UI --
      .pointLabel(d => `
        <div style="
          background: rgba(0,0,0,0.9); 
          color: #21ff00; 
          border: 1px solid #21ff00;
          padding: 5px 10px; 
          font-family: 'Courier New', monospace; 
          font-size: 12px;
          text-transform: uppercase;
        ">
          ${d.name}
        </div>
      `);

    // 3. Control de Cámara
    mundo.controls().autoRotate = true;
    mundo.controls().autoRotateSpeed = 0.5;
  </script>
</body>
</html>
