<!DOCTYPE html>
<html lang="es">
<head>
  <style> 
    body { margin: 0; padding: 0; overflow: hidden; background: #000; } 
    #titulo {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-family: sans-serif;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 8px;
      pointer-events: none; /* Para que no interfiera con el click */
    }
    h1 { margin: 0; font-size: 24px; }
    p { margin: 5px 0 0; color: #aaa; }
  </style>

  <script src="//unpkg.com/globe.gl"></script>
</head>
<body>

  <div id="titulo">
    <h1>Red de Operaciones Global</h1>
    <p>Hub Principal: Texas (Conectando USA)</p>
  </div>

  <div id="globeViz"></div>

  <script>
    // 1. DATOS: Definimos las coordenadas (Latitud, Longitud)
    // El Hub es Texas (usamos coordenadas centrales aprox)
    const HUB_TEXAS = { name: "Texas Hub", lat: 31.96, lng: -99.90 };

    // Los destinos (Spokes)
    const DESTINOS = [
      { name: "Los Angeles", lat: 34.05, lng: -118.24 },
      { name: "Chicago",     lat: 41.87, lng: -87.62 },
      { name: "Nueva York",  lat: 40.71, lng: -74.00 }
    ];

    // 2. PREPARAR DATOS PARA LAS LÍNEAS (ARCOS)
    // Creamos una línea desde Texas hacia cada destino
    const rutas = DESTINOS.map(destino => ({
      startLat: HUB_TEXAS.lat,
      startLng: HUB_TEXAS.lng,
      endLat: destino.lat,
      endLng: destino.lng,
      color: ['#ff0000', '#ffffff'] // Gradiente rojo a blanco
    }));

    // 3. PREPARAR ETIQUETAS (Puntos en el mapa)
    // Juntamos el Hub y los destinos en una sola lista para ponerles nombre
    const etiquetas = [HUB_TEXAS, ...DESTINOS];

    // 4. INICIALIZAR EL GLOBO
    const world = Globe()
      (document.getElementById('globeViz'))
      
      // Imagen de la tierra (Estilo Blue Marble de la NASA)
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      // Imagen de fondo (Espacio con estrellas)
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      
      // Configuración de los Arcos (Las líneas de ruta)
      .arcsData(rutas)
      .arcColor('color')
      .arcDashLength(0.4)       // Longitud de los "guiones" animados
      .arcDashGap(4)            // Espacio entre guiones
      .arcDashAnimateTime(1000) // Velocidad de la animación (viaje)
      .arcStroke(0.5)           // Grosor de la línea

      // Configuración de las Etiquetas (Nombres de ciudades)
      .labelsData(etiquetas)
      .labelLat(d => d.lat)
      .labelLng(d => d.lng)
      .labelText(d => d.name)
      .labelSize(1.5)
      .labelDotRadius(0.8)
      .labelColor(() => 'white')
      .labelResolution(2);

    // 5. AUTO-ROTACIÓN Y ZOOM
    // Enfocamos la cámara en USA al iniciar
    world.pointOfView({ lat: 38, lng: -98, altitude: 1.8 });

    // Hacemos que la tierra gire suavemente
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

  </script>
</body>
</html>
