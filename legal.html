<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Global Monitor</title>
  <script src="//unpkg.com/globe.gl"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    body { 
      margin: 0; 
      background-color: #000; 
      font-family: 'Share Tech Mono', monospace; 
      color: #fff;
      overflow: hidden; 
    }

    /* --- SIDEBAR --- */
    #sidebar {
      position: absolute;
      top: 0; left: 0;
      width: 300px;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85); /* Fondo negro semitransparente */
      border-right: 1px solid #333;
      padding: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }

    h1 { margin: 0 0 10px 0; font-size: 20px; color: #ffcc00; border-bottom: 1px solid #444; padding-bottom: 10px; }
    
    .list-item {
      padding: 12px 10px;
      border-bottom: 1px solid #222;
      cursor: pointer;
      display: flex; justify-content: space-between;
      font-size: 14px;
    }
    .list-item:hover { background: #111; color: #ffcc00; }
    
    /* Sub-lista de destinos */
    .targets-list {
      background: #111;
      padding: 5px 15px;
      font-size: 12px;
      display: none; /* Oculto por defecto */
      border-left: 2px solid #ffcc00;
    }
    .active .targets-list { display: block; } /* Mostrar si está activo */

    #reset-btn {
      margin-top: 20px;
      padding: 10px;
      background: #330000;
      color: #ff5555;
      text-align: center;
      cursor: pointer;
      display: none;
      border: 1px solid #550000;
    }

    /* --- GLOBO --- */
    #globe-viz { width: 100vw; height: 100vh; }
    
    /* Etiquetas del mapa */
    .map-label {
      background: rgba(0,0,0,0.8);
      color: #ffcc00;
      padding: 4px 8px;
      border: 1px solid #ffcc00;
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h1>LOCATIONS</h1>
    <div id="locations-container"></div>
    <div id="reset-btn" onclick="resetMap()">[ X ] CERRAR VISTA</div>
  </div>

  <div id="globe-viz"></div>

  <script>
    // ---------------- DATOS ----------------
    // Estructura: HUB (Origen) -> TARGETS (Destinos)
    const myData = [
      {
        id: 'texas',
        name: "TEXAS HQ",
        lat: 31.9686, lng: -99.9018,
        color: '#ffcc00', // Amarillo Dorado
        targets: [
          { name: "California (AE1)", lat: 36.7783, lng: -119.4179 },
          { name: "New York (AE2)", lat: 40.7128, lng: -74.0060 },
          { name: "Chicago (AE3)", lat: 41.8781, lng: -87.6298 },
          { name: "Colorado (AE4)", lat: 39.5501, lng: -105.7821 }
        ]
      },
      {
        id: 'panama',
        name: "PANAMA OPS",
        lat: 8.5380, lng: -80.7821,
        color: '#ffcc00',
        targets: [
          { name: "Colombia", lat: 4.5709, lng: -74.2973 },
          { name: "Costa Rica", lat: 9.7489, lng: -83.7534 }
        ]
      },
      // Añadimos Abu Dhabi para probar
      { id: 'abudhabi', name: "ABU DHABI", lat: 24.4539, lng: 54.3773, color: '#ffcc00', targets: [] },
      { id: 'london', name: "LONDON", lat: 51.5074, lng: -0.1278, color: '#ffcc00', targets: [] }
    ];

    let currentView = null; // Para saber qué estamos viendo

    // ---------------- CONFIGURACIÓN GLOBO ----------------
    const world = Globe()
      (document.getElementById('globe-viz'))
      
      // 1. APARIENCIA "REAL NIGHT" (Sin Azul)
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .backgroundColor('#000000') // Fondo negro absoluto
      
      // QUITAMOS LA ATMÓSFERA AZUL
      .atmosphereColor('#ffcc00') // Le damos un tinte dorado muy leve
      .atmosphereAltitude(0.05)   // Casi invisible, solo para borde
      
      // 2. CONFIGURACIÓN PUNTOS
      .pointLat('lat')
      .pointLng('lng')
      .pointColor('color') 
      .pointRadius(0.8) // Puntos GRANDES para verlos bien
      .pointAltitude(0.02)
      .pointLabel(d => `<div class="map-label">${d.name}</div>`)
      
      // 3. CONFIGURACIÓN ARCOS (Líneas)
      .arcColor(() => '#ffcc00') // Líneas doradas
      .arcDashLength(0.5)
      .arcDashGap(2)
      .arcDashAnimateTime(2000)
      .arcStroke(0.5)

      // Evento Click
      .onPointClick(onNodeClick);

    // Ajustar iluminación para que no se vea gris
    world.globeMaterial().color = new THREE.Color(0xffffff);
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

    // ---------------- LÓGICA ----------------
    
    // Inicializar
    renderList();
    updateGlobe();

    function renderList() {
      const container = document.getElementById('locations-container');
      container.innerHTML = '';

      myData.forEach(hub => {
        const div = document.createElement('div');
        div.className = 'list-item';
        // Si es el activo, añadimos clase
        if (currentView && currentView.id === hub.id) {
          div.style.background = '#222';
          div.style.color = '#ffcc00';
          div.style.flexDirection = 'column'; // Para que la sublista baje
          
          // Generar sublista HTML
          let subHtml = '<div class="targets-list">';
          hub.targets.forEach(t => { subHtml += `<div>> ${t.name}</div>`; });
          subHtml += '</div>';
          
          div.innerHTML = `
            <div style="display:flex; justify-content:space-between; width:100%">
              <b>${hub.name}</b> <span>▼</span>
            </div>
            ${subHtml}
          `;
        } else {
          div.innerHTML = `<span>${hub.name}</span> <span>+</span>`;
          div.onclick = () => onNodeClick(hub);
        }
        container.appendChild(div);
      });
    }

    function onNodeClick(node) {
      // Solo reaccionamos si es un HUB principal
      const hubData = myData.find(h => h.id === (node.id || node.id)); 
      if (!hubData) return;

      currentView = hubData;
      
      // Zoom al punto
      world.pointOfView({ lat: hubData.lat, lng: hubData.lng, altitude: 1.5 }, 1500);
      world.controls().autoRotate = false;

      // Mostrar botón cerrar
      document.getElementById('reset-btn').style.display = 'block';

      renderList();
      updateGlobe();
    }

    function resetMap() {
      currentView = null;
      world.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 1500);
      world.controls().autoRotate = true;
      document.getElementById('reset-btn').style.display = 'none';
      renderList();
      updateGlobe();
    }

    function updateGlobe() {
      if (currentView) {
        // MODO DETALLE: Mostrar Hub + Targets + Arcos
        const points = [currentView, ...currentView.targets.map(t => ({...t, color: '#ff5555'}))]; // Targets en Rojo
        
        const arcs = currentView.targets.map(t => ({
          startLat: currentView.lat, startLng: currentView.lng,
          endLat: t.lat, endLng: t.lng
        }));

        world.pointsData(points);
        world.arcsData(arcs);

      } else {
        // MODO MUNDIAL: Solo Hubs
        world.pointsData(myData);
        world.arcsData([]);
      }
    }
  </script>
</body>
</html>
