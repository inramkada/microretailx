<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* 1. Estilos Generales */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f4f9;
    padding: 20px;
  }

  h2 {
    color: #333;
    text-align: center;
  }

  /* 2. Contenedor del Hub */
  .operaciones-container {
    max-width: 600px;
    margin: 0 auto;
  }

  /* 3. Estilo de la Tarjeta del Hub */
  .hub-card {
    background-color: white;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    margin-bottom: 15px;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  /* El botón principal (Texas) */
  .hub-header {
    background-color: #0056b3; /* Color corporativo */
    color: white;
    padding: 15px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    font-size: 1.1rem;
  }

  .hub-header:hover {
    background-color: #004494;
  }

  /* Icono de flecha */
  .arrow {
    transition: transform 0.3s ease;
  }
  
  /* Clase para rotar la flecha cuando está activo */
  .active .arrow {
    transform: rotate(180deg);
  }

  /* 4. Lista de destinos (Oculta por defecto) */
  .destinos-list {
    display: none; /* Oculto inicialmente */
    padding: 20px;
    background-color: #fff;
    border-top: 1px solid #eee;
  }

  .destinos-list h4 {
    margin-top: 0;
    color: #666;
    font-size: 0.9rem;
    text-transform: uppercase;
  }

  .destinos-list ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
  }

  .destinos-list li {
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    color: #333;
    display: flex;
    align-items: center;
  }

  /* Icono pequeño antes de la ciudad */
  .destinos-list li::before {
    content: "📍"; 
    margin-right: 10px;
  }

</style>
</head>
<body>

  <h2>Nuestra Red de Operaciones</h2>

  <div class="operaciones-container">

    <div class="hub-card">
      <div class="hub-header" onclick="toggleHub(this)">
        <span>🏭 Hub Principal: Texas</span>
        <span class="arrow">▼</span>
      </div>
      <div class="destinos-list">
        <h4>Rutas de Reparto activas:</h4>
        <ul>
          <li>Los Angeles</li>
          <li>Chicago</li>
          <li>Nueva York</li>
        </ul>
      </div>
    </div>

    <div class="hub-card">
      <div class="hub-header" onclick="toggleHub(this)">
        <span>🏭 Hub Secundario: Florida</span>
        <span class="arrow">▼</span>
      </div>
      <div class="destinos-list">
        <h4>Rutas de Reparto activas:</h4>
        <ul>
          <li>Miami</li>
          <li>Orlando</li>
          <li>Atlanta</li>
        </ul>
      </div>
    </div>

  </div>

  <script>
    // Función para mostrar/ocultar
    function toggleHub(elemento) {
      // 1. Alternar la clase 'active' para la flecha
      elemento.classList.toggle("active");

      // 2. Buscar el siguiente elemento hermano (la lista de destinos)
      var contenido = elemento.nextElementSibling;

      // 3. Si está visible lo ocultamos, si no, lo mostramos
      if (contenido.style.display === "block") {
        contenido.style.display = "none";
      } else {
        contenido.style.display = "block";
      }
    }
  </script>

</body>
</html>
