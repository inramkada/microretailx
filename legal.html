<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Operations Network</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    /* Fondo espacial oscuro, pero limpio */
    body { margin: 0; padding: 0; overflow: hidden; background: #000011; font-family: 'Inter', sans-serif; }

    /* PANEL DE CONTROL */
    #control-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(255, 255, 255, 0.1); /* Efecto cristal claro */
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 24px;
      z-index: 100;
      width: 250px;
      color: white;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    h3 {
      margin: 0 0 15px 0;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ffffff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 8px;
    }

    select {
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    
    select:hover { border-color: white; }

    .legend { margin-top: 15px; font-size: 11px; color: #ccc; }
    .dot { display:inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right:5px; }
  </style>
</head>
<body>

  <div id="control-panel">
    <h3>Operations Center</h3>
    <select id="viewSelector" onchange="enfocarRegion()">
      <option value="all">🌍 Vista Global (Rotación)</option>
      <option value="texas">🇺🇸 Norteamérica (Texas)</option>
      <option value="europe">🇪🇺 Europa & África (Rotterdam)</option>
      <option value="uae">🇦🇪 Medio Oriente (Dubai)</option>
      <option value="asia">🇨🇳 Asia Pacífico (Shanghai)</option>
    </select>

    <div class="legend">
      <div style="margin-bottom: 5px;">
        <span class="dot" style="background-color: #e63946;"></span> Hub Origen
      </div>
      <div>
        <span class="dot" style="background-color: #00ff00;"></span> Destino
      </div>
    </div>
  </div>

  <div id="globeViz"></div>

  <script>
    // --- 1. DEFINICIÓN DE PUNTOS Y RUTAS ---
    const HUBS = {
      texas:   { lat: 32.77, lng: -96.79, name: "Texas Hub" },
      europe:  { lat: 51.92, lng: 4.47,   name: "Rotterdam Hub" },
      uae:     { lat: 25.20, lng: 55.27,  name: "Dubai Hub" },
      asia:    { lat: 31.23, lng: 121.47, name: "Shanghai Hub" }
    };

    const NETWORK = [
      // USA
      { hub: HUBS.texas, to: { lat: 34.05, lng: -118.24, name: "Los Angeles" } },
      { hub: HUBS.texas, to: { lat: 40.71, lng: -74.00,  name: "New York" } },
      { hub: HUBS.texas, to: { lat: 41.87, lng: -87.62,  name: "Chicago" } },

      // EUROPA (Sin España) & AFRICA
      { hub: HUBS.europe, to: { lat: 38.72, lng: -9.13,  name: "Lisboa" } },   // Portugal
      { hub: HUBS.europe, to: { lat: 42.50, lng: 1.52,   name: "Andorra" } },  // Andorra
      { hub: HUBS.europe, to: { lat: 33.57, lng: -7.58,  name: "Casablanca" } }, // Marruecos

      // EMIRATOS (Local)
      { hub: HUBS.uae, to: { lat: 24.45, lng: 54.37, name: "Abu Dhabi" } },
      { hub: HUBS.uae, to: { lat: 25.35, lng: 55.40, name: "Sharjah" } },
      { hub: HUBS.uae, to: { lat: 25.40, lng: 55.51, name: "Ajman" } },

      // ASIA
      { hub: HUBS.asia, to: { lat: 39.90, lng: 116.40, name: "Beijing" } },
      { hub: HUBS.asia, to: { lat: 55.75, lng: 37.61,  name: "Moscow" } },
      { hub: HUBS.asia, to: { lat: 22.31, lng: 114.16, name: "Hong Kong" } }
    ];

    // Preparar datos
    const allArcs = NETWORK.map(r => ({
      startLat: r.hub.lat, startLng: r.hub.lng,
      endLat: r.to.lat, endLng: r.to.lng
    }));

    const points = [];
    NETWORK.forEach(r => {
      points.push({ ...r.hub, type: 'hub' });
      points.push({ ...r.to, type: 'spoke' });
    });

    // --- 2. GLOBO (SATÉLITE) ---
    const world = Globe()
      (document.getElementById('globeViz'))
      
      // ==> CAMBIO: Capa Blue Marble (Visible y clara)
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      
      // ==> CAMBIO: Atmósfera limpia (blanco azulado muy sutil)
      .atmosphereColor('lightskyblue')
      .atmosphereAltitude(0.15)

      // Puntos
      .pointsData(points)
      .pointColor(d => d.type === 'hub' ? '#e63946' : '#00ff00') // Rojo mate y verde brillante
      .pointAltitude(0.01)
      .pointRadius(0.3) // Sutiles
      .pointResolution(10)
      .pointLabel('name') // Mostrar nombre al pasar ratón

      // Líneas
      .arcsData(allArcs)
      .arcColor(() => ['#e63946', '#00ff00']) // De Rojo a Verde
      .arcDashLength(0.4)
      .arcDashGap(1)
      .arcDashAnimateTime(3000)
      .arcStroke(0.5);

    // Rotación inicial activada
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.6;

    // --- 3. LÓGICA DE DETENCIÓN ---
    function enfocarRegion() {
      const region = document.getElementById('viewSelector').value;
      
      // Si elegimos "Vista Global", activamos rotación
      if (region === 'all') {
        world.controls().autoRotate = true;
        world.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 2000);
      } 
      // Si elegimos una región específica, PARAMOS la rotación
      else {
        world.controls().autoRotate = false; // STOP

        const coords = {
          'texas':  { lat: 35, lng: -95, altitude: 1.5 },
          'europe': { lat: 42, lng: 0, altitude: 1.2 }, // Centrado para ver Andorra/PT/Marruecos
          'uae':    { lat: 25, lng: 55, altitude: 0.6 }, // Zoom muy cerca
          'asia':   { lat: 35, lng: 110, altitude: 1.7 }
        };
        
        world.pointOfView(coords[region], 1500);
      }
    }
  </script>
</body>
</html>
