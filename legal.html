<!DOCTYPE html>
<html lang="es">
<head>
  <style> body { margin: 0; background-color: #111; overflow: hidden; } </style>
  <script src="//unpkg.com/globe.gl"></script>
</head>
<body>
  <div id="globo-minimalista"></div>

  <script>
    // 1. TUS DATOS
    const misSedes = [
      { name: "Texas, USA", lat: 31.9686, lng: -99.9018 },
      { name: "Panamá", lat: 8.5380, lng: -80.7821 },
      { name: "Abu Dhabi", lat: 24.4539, lng: 54.3773 },
      { name: "Marruecos", lat: 31.7917, lng: -7.0926 },
      { name: "Nigeria", lat: 9.0820, lng: 8.6753 },
      { name: "Reino Unido", lat: 55.3781, lng: -3.4360 },
      { name: "Noruega", lat: 60.4720, lng: 8.4689 },
      { name: "Suecia", lat: 60.1282, lng: 18.6435 },
      { name: "Holanda", lat: 52.1326, lng: 5.2913 },
      { name: "Alemania", lat: 51.1657, lng: 10.4515 },
      { name: "Bruselas", lat: 50.8503, lng: 4.3517 },
      { name: "Nueva Zelanda", lat: -40.9006, lng: 174.8860 },
      { name: "Perth, Aus", lat: -31.9505, lng: 115.8605 },
      { name: "Chile", lat: -35.6751, lng: -71.5430 }
    ];

    // 2. Configuración Minimalista
    const mundo = Globe()
      (document.getElementById('globo-minimalista'))
      
      // -- A. Apariencia "Escultura Gris" --
      // Usamos la imagen de topología como textura base. Es gris y blanca.
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png') // Mantenemos el relieve
      .backgroundColor('#111111') // Fondo gris muy oscuro (Casi negro, pero más suave)
      
      // -- B. Atmósfera Sutil --
      .atmosphereColor('#ffffff') // Atmósfera blanca
      .atmosphereAltitude(0.1)    // Muy bajita, solo un borde fino
      
      // -- C. Puntos de Color --
      // Al ser el mapa gris, usamos un color vibrante para las sedes.
      .pointsData(misSedes)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(() => '#00C2FF') // Azul Cyan eléctrico (o puedes poner 'orange', 'red')
      .pointAltitude(0.01)
      .pointRadius(0.6)
      
      // -- D. Interactividad --
      .pointLabel(d => `
        <div style="color: #333; background: #fff; padding: 4px 8px; border-radius: 4px; font-family: sans-serif; font-weight: bold;">
          ${d.name}
        </div>
      `);

    // 3. Ajustes de Luz y Movimiento
    mundo.controls().autoRotate = true;
    mundo.controls().autoRotateSpeed = 0.5;

    // Reducir el brillo del material para que parezca mate (piedra/papel)
    const materialGlobo = mundo.globeMaterial();
    materialGlobo.shininess = 0.1; // Poco brillo
    materialGlobo.color = new THREE.Color(0xcccccc); // Oscurecemos un poco la textura blanca original
  </script>
</body>
</html>
